<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER-0 // STATIC_CORE</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --red: #ff0055;
            --bg: #09090e;
            --glass: rgba(15, 15, 25, 0.8);
            --border: rgba(0, 242, 255, 0.2);
            --text-main: #e0e0e0;
            --font: 'Consolas', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, var(--bg) 70%);
            color: var(--text-main);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #terminal-wrapper {
            width: 95vw;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 15px rgba(0,242,255,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #header {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            color: var(--cyan);
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 8px var(--cyan);
            border-radius: 12px 12px 0 0;
        }

        #output {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            font-size: 1.05rem;
            line-height: 1.6;
            scrollbar-width: none;
        }
        #output::-webkit-scrollbar { display: none; }

        .line {
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 0.2s ease forwards;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-5px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .prompt-text { color: var(--cyan); font-weight: bold; margin-right: 10px; text-shadow: 0 0 5px var(--cyan); }
        .accent-text { color: var(--red); font-weight: bold; text-shadow: 0 0 5px var(--red); }
        .success-text { color: #00ff41; font-weight: bold; text-shadow: 0 0 5px #00ff41; }

        #input-area {
            padding: 20px 25px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            border-radius: 0 0 12px 12px;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: var(--cyan);
            font-family: inherit;
            font-size: 1.1rem;
            width: 100%;
            outline: none;
            text-shadow: 0 0 5px var(--cyan);
        }

        #video-feed {
            display: none;
            position: absolute;
            top: 60px; right: 20px;
            width: 300px; border-radius: 8px;
            border: 1px solid var(--cyan);
            box-shadow: 0 0 15px var(--cyan);
        }
    </style>
</head>
<body>

    <div id="terminal-wrapper">
        <div id="header">
            <span>AETHER-0 // STATIC_HARDWARE_INTERFACE</span>
            <span id="clock">00:00:00</span>
        </div>
        <video id="video-feed" autoplay playsinline></video>
        <div id="output"></div>
        <div id="input-area">
            <span class="prompt-text">ROOT@AETHER0:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('cmd-input');
        const clock = document.getElementById('clock');
        const videoElement = document.getElementById('video-feed');
        
        let dirHandle = null; // Holds the real local directory

        setInterval(() => { clock.innerText = new Date().toLocaleTimeString("ja-JP"); }, 1000);

        const AETHER = {
            history: [],
            historyIndex: -1,

            registry: {
                // --- 1. REAL HARDWARE INTERFACES (The non-fake stuff) ---
                "scan_bt": async () => {
                    try {
                        AETHER.printLine(`[>] SCANNING LOCAL FREQUENCIES FOR BLUETOOTH SIGNATURES...`);
                        const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
                        return `<span class='success-text'>[+] BLUETOOTH TARGET ACQUIRED: ${device.name || 'UNKNOWN_DEVICE'} (ID: ${device.id})</span>`;
                    } catch (e) { return `<span class='accent-text'>[!] BLUETOOTH_SCAN_FAILED: ${e.message}</span>`; }
                },

                "scan_usb": async () => {
                    try {
                        AETHER.printLine(`[>] INITIATING SERIAL PORT INTERROGATION...`);
                        const port = await navigator.serial.requestPort();
                        return `<span class='success-text'>[+] USB SERIAL HARDWARE LOCKED. PORT OPENED.</span>`;
                    } catch (e) { return `<span class='accent-text'>[!] SERIAL_ACCESS_DENIED: ${e.message}</span>`; }
                },

                "capture_screen": async () => {
                    try {
                        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                        videoElement.srcObject = stream;
                        videoElement.style.display = 'block';
                        return "<span class='success-text'>[+] DISPLAY UPLINK ESTABLISHED. SCREEN CAPTURE ACTIVE.</span>";
                    } catch (e) { return `<span class='accent-text'>[!] DISPLAY_HIJACK_FAILED: ${e.message}</span>`; }
                },
                
                "stop_capture": () => {
                    if (videoElement.srcObject) {
                        videoElement.srcObject.getTracks().forEach(track => track.stop());
                        videoElement.style.display = 'none';
                        return "[-] DISPLAY UPLINK SEVERED.";
                    }
                    return "NO_ACTIVE_CAPTURE.";
                },

                // --- 2. REAL LOCAL FILESYSTEM (Build WebLooM sites from here) ---
                "mount_drive": async () => {
                    try {
                        dirHandle = await window.showDirectoryPicker();
                        return `<span class='success-text'>[+] LOCAL VOLUME MOUNTED: /${dirHandle.name}</span>`;
                    } catch (e) { return `<span class='accent-text'>[!] MOUNT_ABORTED.</span>`; }
                },

                "ls": async () => {
                    if (!dirHandle) return "<span class='accent-text'>ERR: NO_VOLUME_MOUNTED. Run 'mount_drive' first.</span>";
                    let files = [];
                    for await (const entry of dirHandle.values()) {
                        files.push(entry.kind === 'directory' ? `<span style='color:#b45cff'>[DIR]  ${entry.name}</span>` : `[FILE] ${entry.name}`);
                    }
                    return files.join("<br>");
                },

                "write_file": async (args) => {
                    if (!dirHandle) return "<span class='accent-text'>ERR: NO_VOLUME_MOUNTED.</span>";
                    const parts = args.split(" ");
                    if (parts.length < 2) return "<span class='accent-text'>Usage: write_file [filename.txt] [content]</span>";
                    const fileName = parts[0];
                    const content = parts.slice(1).join(" ");
                    try {
                        const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
                        const writable = await fileHandle.createWritable();
                        await writable.write(content);
                        await writable.close();
                        return `<span class='success-text'>[+] DATA INJECTED INTO: ${fileName}</span>`;
                    } catch (e) { return `<span class='accent-text'>[!] WRITE_ERR: ${e.message}</span>`; }
                },

                // --- 3. THE LIVE REPL ---
                "exec": async (code) => {
                    if (!code) return "<span class='accent-text'>ERR: CODE_REQUIRED</span>";
                    try { 
                        const result = await eval(`(async () => { return ${code} })()`); 
                        return typeof result === 'object' ? JSON.stringify(result) : String(result);
                    } catch (e) { return `<span class='accent-text'>[!] EXEC_ERR: ${e.message}</span>`; }
                },

                // --- 4. CORE PROTOCOLS ---
                "help": () => "PROTOCOLS: " + Object.keys(AETHER.registry).join(", "),
                "clear": () => { output.innerHTML = ""; return ""; },
                "whoami": () => "ID: FAHAD_MALIK | ALIAS: SUPER_STAR | LOC: TOKYO_JPN | ORG: WEBLOOM INC.",
            },

            async execute(rawInput) {
                if (!rawInput.trim()) return;
                
                this.history.push(rawInput);
                this.historyIndex = this.history.length;

                const parts = rawInput.trim().split(/\s+/);
                const cmd = parts[0].toLowerCase();
                const args = parts.slice(1).join(" ");

                this.printLine(`<span class="prompt-text">ROOT@AETHER0:~$</span> ${rawInput}`);

                if (this.registry[cmd]) {
                    try {
                        const result = await this.registry[cmd](args);
                        if (result) this.printLine(result);
                    } catch (err) {
                        this.printLine(`<span class='accent-text'>[!] KERNEL_PANIC: ${err.message}</span>`);
                    }
                } else {
                    this.printLine(`<span class='accent-text'>[!] UNKNOWN_PROTOCOL: '${cmd}'</span>`);
                }
            },

            printLine(text) {
                const line = document.createElement('div');
                line.className = 'line';
                line.innerHTML = text;
                output.appendChild(line);
                output.scrollTop = output.scrollHeight;
            }
        };

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                AETHER.execute(input.value);
                input.value = "";
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (AETHER.historyIndex > 0) {
                    AETHER.historyIndex--;
                    input.value = AETHER.history[AETHER.historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (AETHER.historyIndex < AETHER.history.length - 1) {
                    AETHER.historyIndex++;
                    input.value = AETHER.history[AETHER.historyIndex];
                } else {
                    AETHER.historyIndex = AETHER.history.length;
                    input.value = "";
                }
            }
        });

        document.addEventListener('click', () => input.focus());

        window.onload = () => {
            AETHER.printLine("AETHER-0 STATIC ENGINE [Fox Protocol Active]");
            AETHER.printLine("GITHUB PAGES COMPATIBILITY: <span class='success-text'>VERIFIED</span>.");
            AETHER.printLine("TYPE 'help' TO INITIATE.");
        };
    </script>
</body>
</html>
