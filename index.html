<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER-0 // FOX_MASTER_BUILD</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --red: #ff0055;
            --bg: #09090e;
            --glass: rgba(15, 15, 25, 0.8);
            --border: rgba(0, 242, 255, 0.2);
            --text-main: #e0e0e0;
            --font: 'Consolas', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, var(--bg) 70%);
            color: var(--text-main);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        #terminal-wrapper {
            width: 95vw;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 15px rgba(0,242,255,0.05);
            display: flex;
            flex-direction: column;
            transition: all 0.5s ease;
            z-index: 10;
        }

        #header {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            color: var(--cyan);
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 8px var(--cyan);
            border-radius: 12px 12px 0 0;
        }

        #output {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            font-size: 1.05rem;
            line-height: 1.6;
            scrollbar-width: none;
        }
        #output::-webkit-scrollbar { display: none; }

        .line {
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 0.2s ease forwards;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-5px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .prompt-text { color: var(--cyan); font-weight: bold; margin-right: 10px; text-shadow: 0 0 5px var(--cyan); }
        .accent-text { color: var(--red); font-weight: bold; text-shadow: 0 0 5px var(--red); }
        .success-text { color: #00ff41; font-weight: bold; text-shadow: 0 0 5px #00ff41; }

        #input-area {
            padding: 20px 25px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            border-radius: 0 0 12px 12px;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: var(--cyan);
            font-family: inherit;
            font-size: 1.1rem;
            width: 100%;
            outline: none;
            text-shadow: 0 0 5px var(--cyan);
        }
    </style>
</head>
<body>

    <div id="terminal-wrapper">
        <div id="header">
            <span>AETHER-0 // GOD_MODE_ACTIVE</span>
            <span id="clock">00:00:00</span>
        </div>
        <div id="output"></div>
        <div id="input-area">
            <span class="prompt-text">ROOT@AETHER0:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('cmd-input');
        const clock = document.getElementById('clock');
        const wrapper = document.getElementById('terminal-wrapper');

        // Live Clock
        setInterval(() => { clock.innerText = new Date().toLocaleTimeString("ja-JP"); }, 1000);

        const AETHER = {
            history: [],
            historyIndex: -1,

            registry: {
                // --- 1. DOM DESTRUCTION (Real Web Page Hacks) ---
                "edit_web": () => { document.designMode = "on"; return "<span class='success-text'>[+] DOM UNLOCKED: You can now type anywhere on this webpage.</span>"; },
                "lock_web": () => { document.designMode = "off"; return "<span class='accent-text'>[-] DOM LOCKED.</span>"; },
                "barrel_roll": () => { wrapper.style.transition = "transform 2s"; wrapper.style.transform = "rotate(360deg)"; setTimeout(()=>wrapper.style.transform="", 2000); return "DOING A BARREL ROLL."; },
                "earthquake": () => { let i=0; const iv = setInterval(()=>{ wrapper.style.transform = `translate(${Math.random()*20-10}px, ${Math.random()*20-10}px)`; i++; if(i>20){clearInterval(iv); wrapper.style.transform="";}}, 50); return "<span class='accent-text'>SEISMIC ANOMALY DETECTED.</span>"; },
                "invert": () => { document.body.style.filter = document.body.style.filter === "invert(1)" ? "" : "invert(1)"; return "POLARITY_TOGGLED."; },
                "disco": () => { window.discoIv = setInterval(()=> document.body.style.filter = `hue-rotate(${Math.random()*360}deg)`, 100); return "Rave protocol active. Use 'stop_disco' to halt."; },
                "stop_disco": () => { clearInterval(window.discoIv); document.body.style.filter = ""; return "RAVE_HALTED."; },
                "hide_cursor": () => { document.body.style.cursor = "none"; return "STEALTH_CURSOR_ACTIVE."; },
                "show_cursor": () => { document.body.style.cursor = "default"; return "CURSOR_RESTORED."; },
                "font_bomb": () => { document.body.style.fontFamily = "Comic Sans MS, Papyrus, impact"; return "TYPOGRAPHY_CORRUPTED."; },
                "tilt": () => { wrapper.style.transform = "skew(5deg, 5deg)"; return "GRAVITY_ALTERED."; },
                "untilt": () => { wrapper.style.transform = "none"; return "GRAVITY_RESTORED."; },

                // --- 2. HARDWARE & OS CONTROL (Real Device APIs) ---
                "battery": async () => { try { const b = await navigator.getBattery(); return `BATTERY: ${b.level*100}% | CHARGING: ${b.charging}`; } catch(e) { return "<span class='accent-text'>HARDWARE_LOCKED</span>"; } },
                "vibrate": () => { navigator.vibrate([200, 100, 200, 100, 500]); return "HAPTIC_MOTORS_ENGAGED."; },
                "voice": (msg) => { const u = new SpeechSynthesisUtterance(msg || "Super star override protocol accepted."); window.speechSynthesis.speak(u); return "TTS_ONLINE."; },
                "cores": () => `CPU_LOGICAL_CORES: ${navigator.hardwareConcurrency || 'UNKNOWN'}`,
                "memory": () => `RAM_HEAP_LIMIT: ${performance.memory ? performance.memory.jsHeapSizeLimit / 1048576 + ' MB' : 'DENIED'}`,
                "platform": () => `OS_USER_AGENT: ${navigator.userAgent}`,
                "clip_read": async () => { try { const txt = await navigator.clipboard.readText(); return `CLIPBOARD_CONTENTS: ${txt}`; } catch(e) { return "<span class='accent-text'>CLIPBOARD_DENIED</span>"; } },
                "clip_write": async (txt) => { try { await navigator.clipboard.writeText(txt); return "<span class='success-text'>DATA_INJECTED_TO_CLIPBOARD.</span>"; } catch(e) { return "<span class='accent-text'>INJECTION_FAILED</span>"; } },
                "network": () => { const c = navigator.connection; return c ? `CONNECTION: ${c.effectiveType} | DOWNLINK: ${c.downlink}Mbps` : "NET_API_UNSUPPORTED"; },

                // --- 3. LIVE EXTERNAL DATA HEISTS (No API Keys Needed) ---
                "iss_loc": async () => { const r = await fetch("http://api.open-notify.org/iss-now.json"); const d = await r.json(); return `🛰️ ISS_COORDS: LAT ${d.iss_position.latitude}, LON ${d.iss_position.longitude}`; },
                "crypto_btc": async () => { const r = await fetch("https://api.coindesk.com/v1/bpi/currentprice.json"); const d = await r.json(); return `🪙 BTC_LIVE: $${d.bpi.USD.rate}`; },
                "anime_quote": async () => { const r = await fetch("https://animechan.xyz/api/random"); const d = await r.json(); return `🗡️ ${d.character} (${d.anime}): "${d.quote}"`; },
                "arise": () => { 
                    document.body.style.background = "#050014"; 
                    wrapper.style.borderColor = "#7b00ff";
                    wrapper.style.boxShadow = "0 20px 50px rgba(0,0,0,0.9), inset 0 0 25px rgba(123, 0, 255, 0.3)";
                    document.documentElement.style.setProperty('--cyan', '#b45cff');
                    return "<span style='color:#b45cff; font-weight:bold; text-shadow: 0 0 8px #b45cff'>SHADOW_ARMY_AWAKENED. ARISE.</span>"; 
                },
                "pokemon": async (name) => { try { const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name||'rayquaza'}`); const d = await r.json(); return `🐉 EVO_DATA: ${d.name.toUpperCase()} | TYPE: ${d.types[0].type.name} | HP: ${d.stats[0].base_stat}`; } catch(e){ return "<span class='accent-text'>ENTITY_NOT_FOUND</span>"; } },
                "joke": async () => { const r = await fetch("https://official-joke-api.appspot.com/random_joke"); const d = await r.json(); return `🤡 ${d.setup} ... ${d.punchline}`; },
                "bored": async () => { const r = await fetch("https://www.boredapi.com/api/activity"); const d = await r.json(); return `🎯 SUGGESTED_DIRECTIVE: ${d.activity}`; },
                "fake_user": async () => { const r = await fetch("https://randomuser.me/api/"); const d = await r.json(); const u = d.results[0]; return `👤 IDENTITY_FORGED: ${u.name.first} ${u.name.last} | LOC: ${u.location.city}, ${u.location.country} | DOB: ${u.dob.age}`; },
                "fact": async () => { const r = await fetch("https://uselessfacts.jsph.pl/random.json?language=en"); const d = await r.json(); return `🧠 DB_ENTRY: ${d.text}`; },

                // --- 4. CRYPTOGRAPHY & MATH TOOLS ---
                "uuid": () => self.crypto.randomUUID(),
                "base64_enc": (txt) => btoa(txt),
                "base64_dec": (txt) => atob(txt),
                "hex_enc": (txt) => txt.split('').map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join(' '),
                "url_enc": (txt) => encodeURIComponent(txt),
                "url_dec": (txt) => decodeURIComponent(txt),
                "calc": (eq) => { try { return eval(eq); } catch(e) { return "<span class='accent-text'>MATH_ERR</span>"; } },
                "random_pass": () => "<span class='success-text'>" + Math.random().toString(36).slice(-10) + Math.random().toString(36).slice(-10).toUpperCase() + "!@" + "</span>",
                "timer": (sec) => { setTimeout(()=> alert("TIMER_SEQUENCE_COMPLETED"), sec*1000); return `COUNTDOWN_STARTED: ${sec} seconds.`; },

                // --- 5. BROWSER TABS & NAVIGATION ---
                "search": (q) => { window.open(`https://www.google.com/search?q=${q}`, '_blank'); return "SPAWNING_SEARCH_NODE..."; },
                "youtube": (q) => { window.open(`https://www.youtube.com/results?search_query=${q}`, '_blank'); return "ACCESSING_MEDIA_ARCHIVE..."; },
                "github": () => { window.open(`https://github.com`, '_blank'); return "ACCESSING_CODE_REPOSITORIES..."; },
                "reload": () => { location.reload(); return "REBOOTING..."; },
                "fullscreen": () => { document.documentElement.requestFullscreen(); return "MAXIMIZING_VIEWPORT."; },
                "exit_full": () => { document.exitFullscreen(); return "VIEWPORT_MINIMIZED."; },

                // --- 6. ORIGINAL CORE PROTOCOLS ---
                "whoami": () => "ID: FAHAD_MALIK | ALIAS: SUPER_STAR | LOC: TOKYO_JPN | ORG: WEBLOOM INC.",
                "clear": () => { output.innerHTML = ""; return ""; },
                "help": () => "AVAILABLE_PROTOCOLS:<br>" + Object.keys(AETHER.registry).join(", "),
                
                // --- 7. NOTIFICATIONS & TRACING ---
                "locate_ip": async (ip) => {
                    if (!ip) return "<span class='accent-text'>ERR: TARGET_IP_REQUIRED</span>";
                    try {
                        const res = await fetch(`https://ipapi.co/${ip}/json/`);
                        const data = await res.json();
                        if (data.error) return `<span class='accent-text'>[!] TRACE_FAILED: ${data.reason}</span>`;
                        return `<span class='success-text'>[+] TARGET ACQUIRED</span><br>IP: ${data.ip}<br>CITY: ${data.city}<br>ORG: ${data.org}`;
                    } catch (err) { return `<span class='accent-text'>[!] NETWORK_ERR</span>`; }
                },
                "notify": async (args) => {
                    const parts = args.split(" ");
                    if (parts.length < 2) return "<span class='accent-text'>ERR: SYNTAX IS 'notify [topic] [message]'</span>";
                    const topic = parts[0]; 
                    const msg = parts.slice(1).join(" ");
                    try {
                        const res = await fetch(`https://ntfy.sh/${topic}`, { method: 'POST', body: msg, headers: { 'Title': 'AETHER-0', 'Priority': 'default' } });
                        if (res.ok) return `<span class='success-text'>[+] PUSH_DELIVERED TO /${topic}</span>`;
                        return `<span class='accent-text'>[!] PUSH_FAILED.</span>`;
                    } catch (err) { return `<span class='accent-text'>[!] NETWORK_ERR</span>`; }
                }
            },

            async execute(rawInput) {
                if (!rawInput.trim()) return;
                
                this.history.push(rawInput);
                this.historyIndex = this.history.length;

                const parts = rawInput.trim().split(/\s+/);
                const cmd = parts[0].toLowerCase();
                const args = parts.slice(1).join(" ");

                this.printLine(`<span class="prompt-text">ROOT@AETHER0:~$</span> ${rawInput}`);

                if (this.registry[cmd]) {
                    try {
                        const result = await this.registry[cmd](args);
                        if (result) this.printLine(result);
                    } catch (err) {
                        this.printLine(`<span class='accent-text'>[!] KERNEL_PANIC: ${err.message}</span>`);
                    }
                } else {
                    this.printLine(`<span class='accent-text'>[!] UNKNOWN_PROTOCOL: '${cmd}'</span>`);
                }
            },

            printLine(text) {
                const line = document.createElement('div');
                line.className = 'line';
                line.innerHTML = text;
                output.appendChild(line);
                output.scrollTop = output.scrollHeight;
            }
        };

        // Event Listeners
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                AETHER.execute(input.value);
                input.value = "";
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (AETHER.historyIndex > 0) {
                    AETHER.historyIndex--;
                    input.value = AETHER.history[AETHER.historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (AETHER.historyIndex < AETHER.history.length - 1) {
                    AETHER.historyIndex++;
                    input.value = AETHER.history[AETHER.historyIndex];
                } else {
                    AETHER.historyIndex = AETHER.history.length;
                    input.value = "";
                }
            }
        });

        // Focus keeper
        document.addEventListener('click', () => input.focus());

        // Boot
        window.onload = () => {
            AETHER.printLine("AETHER-0 GOD MODE ENGINE [Fox Protocol Active]");
            AETHER.printLine("ALL 50+ RAW PROTOCOLS UNLOCKED. TYPE 'help' TO INITIATE.");
        };
    </script>
</body>
</html>
